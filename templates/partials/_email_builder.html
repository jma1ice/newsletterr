                                <h2>Snap-ins</h2>

                            </div>
                            <div id="selected-items-list" class="border rounded p-3 mb-4" style="min-height: 100px; background: #8acbd4;">

                                </div>
                            </div>
                            <div id="custom-html-pane" style="display: none;">
                                <textarea id="custom-html-editor" class="form-control font-monospace text-alert"
