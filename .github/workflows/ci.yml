name: CI

on:
  push:
    branches: [main, nightly]
  pull_request:

jobs:
  base-branch:
    # Contributions land in `nightly` first; `main` is release-facing. Two cases
    # are always allowed: the `nightly -> main` promotion, and any PR carrying
    # the `override-base` label for a one-off hotfix.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR base branch
        env:
          BASE: ${{ github.event.pull_request.base.ref }}
          HEAD: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if [ "$BASE" != "main" ]; then
            echo "Base branch is '$BASE', nothing to check."
            exit 0
          fi
          if [ "$HEAD" = "nightly" ] && [ "$HEAD_REPO" = "$GITHUB_REPOSITORY" ]; then
            echo "This is the nightly -> main promotion, allowed."
            exit 0
          fi
          if printf '%s' "$LABELS" | grep -q '"override-base"'; then
            echo "PR is labelled override-base, allowed."
            exit 0
          fi
          echo "::error title=Wrong base branch::This PR targets 'main'. Pull requests go to 'nightly' first, see CONTRIBUTING.md. Retarget it with the Edit button next to the PR title (no need to close and reopen), or add the 'override-base' label if this is a deliberate hotfix."
          exit 1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/ newsletterr.py tests/

      - name: JS syntax check
        run: |
          for f in static/js/app/*.js; do
            node --check "$f"
          done

      - name: Tests
        run: pytest

  docker-smoke:
    # Guards the rootless image (NEWS-7): the container must start as the
    # baked-in non-root user and the server must answer, so a permission
    # regression on the volumes cannot land silently.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: newsletterr:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container as non-root and check it answers
        run: |
          docker run -d --name nl-smoke -p 6397:6397 newsletterr:smoke

          # The default user must be non-root (uid 1000), not root.
          UID_IN_CONTAINER="$(docker exec nl-smoke id -u)"
          if [ "$UID_IN_CONTAINER" != "1000" ]; then
            echo "::error::Container is running as uid $UID_IN_CONTAINER, expected non-root 1000"
            docker logs nl-smoke
            exit 1
          fi

          # Wait for the server; /login redirects to /setup on a fresh install,
          # so follow redirects and require a final 200.
          for i in $(seq 1 30); do
            if curl -fsSL -o /dev/null http://127.0.0.1:6397/login; then
              echo "Server answered after ${i}s"
              docker rm -f nl-smoke
              exit 0
            fi
            sleep 1
          done

          echo "::error::Server did not answer /login within 30s"
          docker logs nl-smoke
          exit 1
