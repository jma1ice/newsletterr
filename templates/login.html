<!DOCTYPE html>
<html lang="en">
    <head>
        <title>login</title>
        {% include 'partials/_head_min.html' %}
    </head>
    <body class="auth-body">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="/static/img/Asset_94x.png" alt="newsletterr" class="auth-logo-img" />
                <p class="auth-sub">Please sign in to continue</p>
            </div>

            {% if error %}
                <div class="nl-alert nl-alert--danger mb-3" role="alert">{{ error }}</div>
            {% endif %}
            {% if alert %}
                <div class="nl-alert nl-alert--success mb-3" role="alert">{{ alert }}</div>
            {% endif %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
                <div class="auth-field">
                    <label for="username">Username</label>
                    <input type="text" class="nl-input" id="username" name="username" required>
                </div>

                <div class="auth-field">
                    <label for="password">Password</label>
                    <input type="password" class="nl-input" id="password" name="password" required>
                </div>

                <button type="submit" class="nl-btn nl-btn--primary auth-submit">Sign In</button>
            </form>
        </div>
    </body>
</html>
