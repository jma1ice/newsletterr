name: Docker Publish

# Channel mapping:
#   push to nightly branch  -> :nightly
#   push to main            -> :pre-release
#   published release       -> :latest, :nightly, :pre-release, :<tag>
# PR events never publish; tests run in ci.yml instead.

on:
  push:
    branches: [main, nightly]
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify release tag matches VERSION file
        if: github.event_name == 'release'
        run: |
          FILE_VERSION="$(head -n 1 VERSION)"
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" != "$FILE_VERSION" && "$TAG" != "$FILE_VERSION"-* ]]; then
            echo "Release tag $TAG does not match VERSION file $FILE_VERSION" >&2
            exit 1
          fi

      - name: Determine image tags
        id: tags
        run: |
          REPO="jma1ice/newsletterr"

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"

            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              echo "tags=$REPO:pre-release,$REPO:$TAG" >> "$GITHUB_OUTPUT"
            else
              echo "tags=$REPO:latest,$REPO:nightly,$REPO:pre-release,$REPO:$TAG" >> "$GITHUB_OUTPUT"
            fi
            
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=$REPO:pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "tags=$REPO:nightly" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
